<html lang="en">
<head>
    <meta charset="UTF-8">

<body align="center">
    <fieldset  > <legend align="left">my first HTML </legend><form>
    <h1>Fill the form...</h1>
    <label>Name:</label><input type="text" name="name" placeholder="Enter Your Full Name"><br>
    <label>Email:</label><input type="email" name="email" placeholder="Enter your email"><br>
    <label>Password:</label><input type="password" name="password" placeholder="Enter your password"><br><br>
    <label><b>Gender :</b></label><br><br>
    <input type="radio" name="Gender" value="male">male
    <input type="radio" name="Gender" value="female">female<br><br>
    <label><b>Select any Language</b></label><br><br>
    <input type="checkbox" name="Language" value="English">English<br>
    <input type="checkbox" name="Language" value="Spanish">Spanish<br>
    <input type="checkbox" name="Language" value="Arabic">Arabic<br><br>
    <label><b>Select the subject</b></label><br><br>
    <select>
        <option>Default</option>
        <option>Backend</option>
        <option>Frontend</option>
    </select><br><br>
    <input type="submit" name="submit"><br><br>
    <a href="assignment.html">Back to Main Page</a>
    </form></fieldset>

</html>
